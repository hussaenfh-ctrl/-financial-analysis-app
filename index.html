<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>برنامج التحليل المالي</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <h1>📊 برنامج التحليل المالي</h1>
    <div class="header-actions">
      <button id="btnSample" class="btn btn-ghost">تحميل بيانات تجريبية</button>
      <button id="btnPrint" class="btn btn-ghost no-print">طباعة / PDF</button>
      <button id="btnReset" class="btn btn-ghost btn-danger-text">مسح البيانات</button>
    </div>
  </div>
  <nav class="tabs no-print">
    <button class="tab-btn active" data-tab="entry">إدخال البيانات</button>
    <button class="tab-btn" data-tab="ratios">النسب المالية</button>
    <button class="tab-btn" data-tab="vertical">التحليل الرأسي</button>
    <button class="tab-btn" data-tab="horizontal">التحليل الأفقي</button>
    <button class="tab-btn" data-tab="ccc">دورة CCC</button>
    <button class="tab-btn" data-tab="summary">الخلاصة والرأي الفني</button>
  </nav>
</header>

<main id="app-main">

  <!-- تبويب: إدخال البيانات -->
  <section id="tab-entry" class="tab-panel active">
    <div class="entry-mode-switch">
      <button id="modeManualBtn" class="mode-btn active" data-mode="manual">إدخال يدوي</button>
      <button id="modeExcelBtn" class="mode-btn" data-mode="excel">رفع ملف إكسيل</button>
    </div>

    <div id="manualEntryMode" class="entry-mode-panel active">
      <div class="entry-toolbar">
        <button id="btnAddPeriod" class="btn btn-primary">+ إضافة فترة / سنة</button>
        <span id="balanceStatus" class="balance-status"></span>
      </div>
      <div class="table-scroll">
        <table id="manualTable" class="manual-table"></table>
      </div>
    </div>

    <div id="excelEntryMode" class="entry-mode-panel">
      <div class="card excel-upload-card">
        <p>ارفع أي ملف Excel أو CSV يحتوي على قائمة الدخل و/أو المركز المالي. بعد الرفع، هتقدر تطابق بنودنا يدويًا بصفوف وأعمدة ملفك.</p>
        <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv">
        <div id="excelStatus" class="mapping-status"></div>
      </div>
      <div id="excelMappingContainer" class="excel-mapping-container"></div>
    </div>
  </section>

  <!-- تبويب: النسب المالية -->
  <section id="tab-ratios" class="tab-panel">
    <div id="ratiosContent" class="content-block"></div>
  </section>

  <!-- تبويب: التحليل الرأسي -->
  <section id="tab-vertical" class="tab-panel">
    <div id="verticalContent" class="content-block"></div>
  </section>

  <!-- تبويب: التحليل الأفقي -->
  <section id="tab-horizontal" class="tab-panel">
    <div id="horizontalContent" class="content-block"></div>
  </section>

  <!-- تبويب: دورة CCC -->
  <section id="tab-ccc" class="tab-panel">
    <div id="cccContent" class="content-block"></div>
  </section>

  <!-- تبويب: الخلاصة والرأي الفني -->
  <section id="tab-summary" class="tab-panel">
    <div id="summaryContent" class="content-block"></div>
  </section>

</main>

<footer class="app-footer no-print">
  <p>هذا التطبيق يعمل بالكامل داخل متصفحك - بياناتك المالية لا تُرسل لأي خادم خارجي. التحليل آلي إرشادي وليس استشارة مالية معتمدة.</p>
</footer>

<!-- مكتبات خارجية (منسوخة محليًا في vendor/ لعدم الاعتماد على اتصال إنترنت وقت الاستخدام) -->
<script src="vendor/xlsx.full.min.js"></script>
<script src="vendor/chart.umd.min.js"></script>

<!-- ملفات التطبيق -->
<script src="sample-data.js"></script>
<script src="js/dataModel.js"></script>
<script src="js/analysis.js"></script>
<script src="js/narrative.js"></script>
<script src="js/excelImport.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
